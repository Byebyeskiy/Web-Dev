<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body class="bg-gray-100">

<div class="max-w-6xl mx-auto mt-6 p-4 bg-gray-100">
    <p class="text-gray-500 mb-4">0 selected</p>

    <div class="bg-white rounded-lg border border-gray-300 overflow-x-auto">
        <div class="flex justify-end gap-6 p-4 text-gray-700">
            <div>
                <i class="fa-solid fa-arrow-down-wide-short"></i>
                Sort by
            </div>
            <div>
                <i class="fa-solid fa-ellipsis-vertical"></i>
                Actions
            </div>
        </div>

        <table class="w-full min-w-[800px] border-collapse">
            <thead>
            <tr class="text-left text-gray-500 border-t border-gray-300 border-b border-gray-300">
                <th class="p-4">
                    <input type="checkbox">
                    <i class="fa-solid fa-angle-down text-xs"></i>
                </th>
                <th class="p-4">Name</th>
                <th class="p-4">Properties</th>
                <th class="p-4">Created by</th>
                <th class="p-4">Last updated</th>
                <th class="p-4"></th>
            </tr>
            </thead>

            <tbody>
            <tr class="border-b border-gray-300 hover:bg-gray-100">
                <td class="p-4"><input type="checkbox"></td>
                <td class="p-4 ">denver</td>
                <td class="p-4">24</td>
                <td class="p-4">Me</td>
                <td class="p-4">02/27/2026 at 1:41PM</td>
                <td class="p-4 text-right"><i class="fa-solid fa-ellipsis-vertical"></i></td>
            </tr>

            <tr class="border-b border-gray-300 hover:bg-gray-100">
                <td class="p-4"><input type="checkbox"></td>
                <td class="p-4 ">test save</td>
                <td class="p-4">10</td>
                <td class="p-4">Me</td>
                <td class="p-4">02/10/2026 at 5:52PM</td>
                <td class="p-4 text-right"><i class="fa-solid fa-ellipsis-vertical"></i></td>
            </tr>

            <tr class="border-b border-gray-300 hover:bg-gray-100">
                <td class="p-4"><input type="checkbox"></td>
                <td class="p-4 ">gggg</td>
                <td class="p-4">10</td>
                <td class="p-4">Me</td>
                <td class="p-4">02/04/2026 at 5:49PM</td>
                <td class="p-4 text-right"><i class="fa-solid fa-ellipsis-vertical"></i></td>
            </tr>

            <tr class="border-b border-gray-300 hover:bg-gray-100">
                <td class="p-4"><input type="checkbox"></td>
                <td class="p-4 ">test full export</td>
                <td class="p-4">4059</td>
                <td class="p-4">Me</td>
                <td class="p-4">02/02/2026 at 11:19AM</td>
                <td class="p-4 text-right"><i class="fa-solid fa-ellipsis-vertical"></i></td>
            </tr>
            <tr class="border-b border-gray-300 hover:bg-gray-100">
                <td class="p-4"><input type="checkbox"></td>
                <td class="p-4 ">denver 1</td>
                <td class="p-4">14</td>
                <td class="p-4">Me</td>
                <td class="p-4"> 01/23/2026 at 9:20AM</td>
                <td class="p-4 text-right"> <i class="fa-solid fa-ellipsis-vertical"></i></td>
            </tr>
            </tbody>
        </table>

        <div class="flex justify-between items-center p-4">
            <div class="text-gray-500">
                Show
                <span class="border border-gray-300 rounded px-3 py-2 text-black bg-white">5</span>
                of 5 results
            </div>

            <div class="w-10 h-10 rounded-full border-2 border-green-400 flex items-center justify-center">
                1
            </div>
        </div>
    </div>
</div>

</body>
</html>
